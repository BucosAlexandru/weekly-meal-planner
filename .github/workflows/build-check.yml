name: Build & Quality Check

# Runs on every push to main and on every PR targeting main.
# A failed check surfaces broken builds, missing recipes, curly-quote JS bugs,
# and bad sitemaps before they reach production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, lint & validate
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node setup
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Curly-quote check (MUST run before build)
      # U+2018 and U+2019 in recipes.js break JS parsing silently.
      # Uses \u escape sequences so no curly-quote bytes appear in this YAML file.
      - name: Check recipes.js for curly quotes (U+2018 / U+2019)
        run: |
          python3 -c "
          import sys
          src = open('public/js/recipes.js', encoding='utf-8').read()
          lsq = src.count('\u2018')
          rsq = src.count('\u2019')
          total = lsq + rsq
          if total > 0:
              print('ERROR: ' + str(total) + ' curly quote(s) found in recipes.js')
              print('  U+2018 left  count: ' + str(lsq))
              print('  U+2019 right count: ' + str(rsq))
              print('Replace with straight apostrophes before committing.')
              sys.exit(1)
          print('OK: No curly quotes in recipes.js')
          "

      # 5. JavaScript syntax check (API serverless files)
      # esbuild (step 6) covers public/js/. API files are NOT bundled,
      # so we check them explicitly with Node's built-in syntax checker.
      - name: Check JavaScript syntax (API files)
        run: |
          for file in \
            api/check-access.js \
            api/chat.js \
            api/coach.js \
            api/generate-pdf.js \
            api/generate-token.js \
            api/stripe-webhook.js \
            api/create-checkout-session.js \
            api/create-portal-session.js \
            api/_lib/requirePremium.js; do
            if [ -f "$file" ]; then
              node --check "$file" && echo "OK: $file" || { echo "SYNTAX ERROR: $file"; exit 1; }
            fi
          done

      # 6. Full build
      # Runs: esbuild (JS) + esbuild (CSS) + generate-content.mjs (2562 HTML pages + sitemap)
      # esbuild will abort on any JS syntax error in public/js/ source files.
      - name: Build (JS + CSS + content generation)
        run: npm run build

      # 7. Verify minified asset files exist
      - name: Verify build artifacts
        run: |
          FAIL=0
          for f in \
            public/js/app.min.js \
            public/js/checkout.min.js \
            public/js/portal.min.js \
            public/css/style.min.css; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

      # 8. HTML page count
      # Expected: ~3670 pages (Phase 5 architecture):
      #   - 204 recipes × 14 locales        = 2856 recipe pages
      #   - 46 country pages × 14 locales   =  644 country pages
      #     (under /<lc>/<recipe-prefix>/<country-slug>/)
      #   - 14 recipe-index/cuisine hubs    =   14
      #   - 8 plans × 14 locales + 14 index =  126 plan pages
      #   - 14 pricing pages                =   14
      #   - 14 SPA homes (planner)          =   14 (+ 2 root)
      # If this number changes, update the thresholds here and in AGENTS.md.
      - name: Verify HTML page count (expected ~3670)
        run: |
          COUNT=$(find public -name "*.html" | wc -l | tr -d ' ')
          echo "HTML pages found: $COUNT"
          if [ "$COUNT" -lt 3550 ]; then
            echo "ERROR: Too few pages. Expected ~3670, got $COUNT"
            echo "Content generation may have failed or recipes/cuisines were removed."
            exit 1
          fi
          if [ "$COUNT" -gt 3800 ]; then
            echo "ERROR: Too many pages ($COUNT) -- check generate-content.mjs for duplicates"
            exit 1
          fi
          echo "Page count OK: $COUNT"

      # 9. Sitemap validation
      # generate-content.mjs writes the sitemap to public/sitemap.xml (not repo root).
      # Expected: ~3670 <url> entries after build.
      - name: Validate sitemap.xml (expected ~3670 URLs)
        run: |
          if [ ! -f "public/sitemap.xml" ]; then
            echo "ERROR: public/sitemap.xml not found after build"
            exit 1
          fi
          URL_COUNT=$(grep -c "<url>" public/sitemap.xml)
          echo "sitemap.xml url entries: $URL_COUNT"
          if [ "$URL_COUNT" -lt 3550 ]; then
            echo "ERROR: Expected ~3670 URLs, got $URL_COUNT -- sitemap may be incomplete"
            exit 1
          fi
          if [ "$URL_COUNT" -gt 3800 ]; then
            echo "ERROR: Too many URLs ($URL_COUNT) -- check for sitemap generation bug"
            exit 1
          fi
          echo "Sitemap OK: $URL_COUNT URLs"

      # 10. Secret leak check
      # Prevents accidentally committing live Stripe keys or Supabase service keys.
      # The anon key in app.js is intentionally public -- only service/secret keys are dangerous.
      - name: Check for accidentally committed secrets
        run: |
          FAIL=0
          if grep -r "sk_live_" --include="*.js" --include="*.json" --exclude-dir=node_modules . 2>/dev/null | grep -v "^Binary"; then
            echo "ERROR: Live Stripe secret key found in source files"
            FAIL=1
          fi
          if grep -r "SUPABASE_SERVICE_ROLE_KEY\s*=" --include="*.js" --include="*.env" --exclude-dir=node_modules . 2>/dev/null | grep -v "process\.env"; then
            echo "ERROR: Supabase service role key hardcoded in source"
            FAIL=1
          fi
          [ "$FAIL" -eq 0 ] && echo "OK: No leaked secrets detected" || exit 1
