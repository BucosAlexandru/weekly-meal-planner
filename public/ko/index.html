<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Titlul și meta se suprascriu din i18n.js -->
  <title>주간 식단 플래너 & 장보기 리스트 – 무료 PDF</title>
  <meta name="description" content="주간 식단을 계획하고 장보기 리스트를 자동 생성하며, 모든 내용을 PDF로 저장하세요 – 무료로, 다국어 지원!">

  <!-- canonical & alternate -->
  <link rel="canonical" href="https://meal-planner.ro/ko/" />
  <link rel="alternate" hreflang="x-default" href="https://meal-planner.ro/" />
  <link rel="alternate" hreflang="ro" href="https://meal-planner.ro/ro/" />
  <link rel="alternate" hreflang="en" href="https://meal-planner.ro/en/" />

  <link rel="alternate" hreflang="zh" href="https://meal-planner.ro/zh/" />
  <link rel="alternate" hreflang="ja" href="https://meal-planner.ro/ja/" />
  <link rel="alternate" hreflang="pt" href="https://meal-planner.ro/pt/" />
  <link rel="alternate" hreflang="de" href="https://meal-planner.ro/de/" />
  <link rel="alternate" hreflang="ar" href="https://meal-planner.ro/ar/" />
  <link rel="alternate" hreflang="hi" href="https://meal-planner.ro/hi/" />
  <link rel="alternate" hreflang="tr" href="https://meal-planner.ro/tr/" />
  <link rel="alternate" hreflang="it" href="https://meal-planner.ro/it/" />
  <link rel="alternate" hreflang="ko" href="https://meal-planner.ro/ko/" />

    <!-- PWA / Favicons -->
  <meta name="theme-color" content="#198754" />
  <link rel="manifest" href="/images/site.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/images/web-app-manifest-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/images/web-app-manifest-512x512.png" />
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.min.css" />
</head>
<body>

<div class="container py-5" id="pdf-content">

  <div class="mb-3 no-print text-end">
    <select id="lang-switcher" class="form-select w-auto"></select>
  </div>

  <div class="card mb-4 text-center">
    <div class="card-header bg-success text-white">
      <h1 data-i18n="header">식단 플래너 & 장보기 리스트</h1>
    </div>
  </div>

  <div id="seo-paragraph"></div>

  <div class="text-center mb-3">
    <button id="auto-menu-btn" class="btn btn-success" data-i18n="btn.autoMenu">
      랜덤 메뉴 생성
    </button>
  </div>

  <div class="card mb-4">
    <div class="card-body">
      <table class="table">
        <thead>
          <tr>
            <th data-i18n="col.day">요일</th>
            <th data-i18n="col.lunch">점심</th>
            <th data-i18n="col.dinner">저녁</th>
          </tr>
        </thead>
        <tbody id="plan-table"></tbody>
      </table>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-body">
      <h2 data-i18n="shoppingList">장보기 리스트</h2>
      <ul id="shopping-list" class="list-group list-group-flush"></ul>
    </div>
  </div>

  <div class="text-center mb-4 no-print">
    <select id="currency-select" class="form-select d-inline-block w-auto me-2">
      <option value="RON">RON</option>
      <option value="EUR" selected>EUR</option>
    </select>

    <button id="pay-btn" class="btn btn-warning" data-i18n="btn.pay">결제 & 다운로드</button>
    <button id="generate-btn" class="btn btn-success ms-2" data-i18n="btn.generate">PDF 생성</button>
  </div>

  <div class="card mb-4 text-center">
    <div class="card-header bg-info text-dark" data-i18n="banner.unlock">
      이미 결제하셨나요? PDF 무제한 다운로드 가능
    </div>
    <div class="card-body">
      <input id="emailInput" type="email" class="form-control mb-2" data-i18n-placeholder="input.email">
      <button id="verifyBtn" class="btn btn-success" data-i18n="btn.verify">이메일 확인</button>
      <div id="result"></div>
    </div>
  </div>

</div>

  <!-- Supabase + app scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="/js/app.js" defer></script>
  <script src="/js/checkout.min.js" defer></script>
  <script src="/js/portal.min.js" defer></script>
</body>
</html>
